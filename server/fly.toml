# FRAUDE web API — Fly.io yapılandırması.
# Derleme bağlamı repo köküdür (fraude-core path bağımlılığı); komutlar
# REPO KÖKÜNDEN çalıştırılır:
#   İlk kurulum:  fly launch --no-deploy -c server/fly.toml
#   Deploy:       fly deploy -c server/fly.toml
# Gizli anahtarlar:  fly secrets set ALLOWED_ORIGIN=https://<vercel-domain> ...

app = "fraude-api"
primary_region = "fra"   # Frankfurt — Türkiye'ye en yakın düşük gecikme

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RUST_LOG = "info"
  # ALLOWED_ORIGIN Vercel prod origin'i ile fly secrets/env üzerinden ayarlanır.

[http_service]
  internal_port = 8080
  force_https = true
  # Arka plan döngüleri (IPO tazeleme + çok kiracılı monitor) sürekli çalışmalı;
  # bu yüzden makineler otomatik durdurulmaz ve en az 1 makine hep açık kalır.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
